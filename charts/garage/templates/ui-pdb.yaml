{{- if and .Values.ui.enabled .Values.ui.podDisruptionBudget.enabled -}}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "garage.uiFullname" . }}
  labels:
    {{- include "garage.uiLabels" . | nindent 4 }}
    {{- with .Values.ui.podDisruptionBudget.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- if or .Values.commonAnnotations .Values.ui.podDisruptionBudget.annotations }}
  annotations:
    {{- with .Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.ui.podDisruptionBudget.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  {{- if ne (toString .Values.ui.podDisruptionBudget.minAvailable) "" }}
  minAvailable: {{ .Values.ui.podDisruptionBudget.minAvailable }}
  {{- else }}
  maxUnavailable: {{ .Values.ui.podDisruptionBudget.maxUnavailable }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "garage.uiSelectorLabels" . | nindent 6 }}
{{- end }}
